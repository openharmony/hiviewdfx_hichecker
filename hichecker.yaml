domain: RELIABILITY

MEMORY_LEAK_JS_LEAK_WATCHER:
  __BASE: {type: FAULT, level: CRITICAL, tag: JsLeakWatcher, desc: jsleakwatcher detect is memory leak}
  PID: {type: INT32, desc: pid}
  HAPPEN_TIME: {type: STRING, desc: fault trigger time}
  MODULE: {type: STRING, desc: module name}
  LEAK_LIST: {type: STRING, desc: leak list}
  DYNAMIC_RAWHEAP_PATH: {type: STRING, desc: dynamic rawheap path}
  STATIC_RAWHEAP_PATH: {type: STRING, desc: static rawheap path}
  LEAK_LIST_PATH: {type: STRING, desc: leak list path}
  LEAK_OBJECT_COUNT: {type: INT32, desc: leak object count}